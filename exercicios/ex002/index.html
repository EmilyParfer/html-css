<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebra de linha</h1>
    <hr>
    <p>Você pode escrever um parágrafo utilizando a tag p.</p>
    <p>Se utilizar a tag p, terá outro parágrafo mas não terá o pulo de linha como a tag br. Se colocar <br> no meio, o texto pula &lt;p&gt; de &lt;/p&gt; linha.</p>
    <!--Comentário
    &lt significa less than 
    &gt significa greater than
    -->
    <p>Vamos gerar símbolos especiais:
        &reg;
        &copy;
        &trade;
        &euro;
        &pound;
        &uarr;
        &uacute;
        &Delta;
    </p>
    <p>Vamos adicionar emojis:
        &#x1F600;
        &#x1F354;
    </p>
</body>
</html>
