<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <style>


    @import url('https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');

    @import url('https://fonts.googleapis.com/css2?family=Chelsea+Market&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');
            
* {
            font-family: "Work Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: bolder;
            font-style: normal;
            font-size: 32 px;
            color: black;
        }

        h1 {
            font-family: 'Chelsea Market', Times, serif;
        }
    </style>
</head>
<body>

    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Quibusdam, assumenda. Odit itaque esse saepe voluptatem, error expedita officia rem. Iusto iure exercitationem beatae molestias laudantium molestiae cupiditate assumenda magni labore?</p>
